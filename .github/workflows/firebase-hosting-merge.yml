name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ./square-series/package-lock.json

      - run: npm ci
        working-directory: ./square-series

      - run: npm run build
        working-directory: ./square-series

      - name: Write Firebase service account
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SITECABINET_87A92 }}' > "${{ runner.temp }}/firebase-key.json"

      - name: Check Firebase key
        run: |
          test -s "${{ runner.temp }}/firebase-key.json"
          jq -r '.client_email' "${{ runner.temp }}/firebase-key.json"

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@15.22.1 deploy --only hosting --project sitecabinet-87a92
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-key.json
